name: Widget
options:
  bundleIdPrefix: com.iosmirror
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO
    CLANG_ANALYZER_LOCALRICKET_PROJECT_SETTINGS_VERSION: "999"
    GENERATE_INFOPLIST_FILE: NO
    Swift_STRICT_CONCURRENCY: minimal

targets:
  Widget:
    type: application
    platform: iOS
    sources:
      - path: Widget/Sources
      - path: Widget/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.iosmirror
        INFOPLIST_FILE: Widget/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/Frameworks"
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
    info:
      path: Widget/Resources/Info.plist
      properties:
        CFBundleDisplayName: Widget
        CFBundleName: Widget
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIPortrait
          - UILandscapeLeft
          - UILandscapeRight
    entitlements:
      path: Widget/Resources/Widget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.iosmirror
    dependencies:
      - target: BroadcastExtension
        embed: true

  BroadcastExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: BroadcastExtension/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.iosmirror.broadcast
        INFOPLIST_FILE: BroadcastExtension/Sources/Info.plist
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/Frameworks"
          - "@executable_path/../../Frameworks"
    info:
      path: BroadcastExtension/Sources/Info.plist
      properties:
        CFBundleDisplayName: Broadcast
        CFBundleName: Broadcast
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: BroadcastExtension/Sources/BroadcastExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.iosmirror

schemes:
  Widget:
    build:
      targets:
        Widget: all
        BroadcastExtension: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release