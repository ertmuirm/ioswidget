name: Widget
options:
  bundleIdPrefix: com.iosmirror
  deploymentTarget:
    iOS: "16.0"

targets:
  Widget:
    type: application
    platform: iOS
    sources:
      - path: Widget/Sources
      - path: Widget/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.iosmirror
        INFOPLIST_FILE: Widget/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
    dependencies:
      - target: BroadcastExtension
        embed: true

  BroadcastExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: BroadcastExtension/Sources
        excludes:
          - "**/Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.iosmirror.broadcast
        INFOPLIST_FILE: BroadcastExtension/Sources/Info.plist
        SKIP_INSTALL: YES
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: ""
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    dependencies:
      - sdk: WidgetKit.framework

schemes:
  Widget:
    build:
      targets:
        Widget: all
        BroadcastExtension: all