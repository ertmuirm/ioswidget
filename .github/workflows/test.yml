name: Minimal Test

on:
  push:
    branches: [widget-app-v1]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Hello
        run: echo "Hello from test"
      - name: Check environment
        run: |
          echo "Node version:"
          node --version || echo "no node"
          echo "Python version:"
          python3 --version
      - name: Create artifact
        run: echo "test" > test.txt
        
      - uses: actions/upload-artifact@v4
        with:
          name: test-artifact
          path: test.txt