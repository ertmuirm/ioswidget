name: Build Widget new

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          xcodebuild archive -scheme Widget -configuration Release -archivePath ./build/Widget.xarchive CODE_SIGNING_ALLOWED=NO \
 
      - name: Embed Extension Manually
        run: |
          EXTENSION_PATH="./DerivedData/Build/Products/Release-iphoneos/BroadcastExtension.appex"
          APP_PATH="./build/Widget.xarchive/Products/Applications/Widget.app"
          
          # Create PlugIns folder if needed
          mkdir -p "$APP_PATH/PlugIns"
          
          # Copy extension
          cp -R "$EXTENSION_PATH" "$APP_PATH/PlugIns/"
          
          # Verify
          ls -la "$APP_PATH/PlugIns/"

      - name: Package as IPA
        run: |
          mkdir -p Payload
          cp -r ./build/Widget.xarchive/Products/Applications/Widget.app Payload/
          chmod +x Payload/Widget.app/Widget
          zip -r Widget.ipa Payload
                 
          # Verify contents
          unzip -l Widget.ipa | head -15
      - name: Upload unsigned IPA
      uses: actions/upload-artifact@v4
        with:
          name: Widget
          path: Widget.ipa
          retention-days: 30
