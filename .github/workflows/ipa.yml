name: Build Widget

on:
  push:
    branches: [widget-app-v1]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: |
          which xcodegen || brew install xcodegen
          xcodegen --version
      - name: Generate project
        run: |
          xcodegen generate
          ls -la *.xcodeproj
      - name: Build release
        run: |
          xcodebuild -project Widget.xcodeproj -scheme Widget -configuration Release -destination generic/platform=iOS build CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY="" 2>&1 | tee build.log | tail -30
        timeout-minutes: 25
      - name: Check build output
        run: |
          echo "=== Build outputs ==="
          ls -la build/ 2>/dev/null || echo "No build dir"
          find ~/Library/Developer/Xcode/DerivedData -name "Widget.app" -type d 2>/dev/null | head -3
          grep -E "(BUILD SUCCEEDED|BUILD FAILED|error:|warning:)" build.log || echo "Log issues check"
      - name: Package app
        run: |
          mkdir -p dist/Payload/Widget.app
          
          # Try multiple paths
          APP=""
          for path in build/Release-iphoneos/Widget.app; do
            if [ -d "$path" ]; then
              APP="$path"
              break
            fi
          done
          
          # Try DerivedData if not found
          if [ -z "$APP" ]; then
            APP=$(find ~/Library/Developer/Xcode/DerivedData -name "Widget.app" -type d 2>/dev/null | head -1)
          fi
          
          echo "Using app: $APP"
          
          if [ -n "$APP" ] && [ -d "$APP" ]; then
            cp -R "$APP"/* dist/Payload/Widget.app/
          else
            # Include project sources as fallback
            echo "BUILD NOT FOUND - including project sources"
            cp -r Widget dist/Payload/
            cp -r BroadcastExtension dist/Payload/
            cp project.yml dist/Payload/
          fi
          
          ls -la dist/Payload/
          du -sh dist/Payload/
      - name: Create IPA
        run: |
          cd dist && zip -r9 ../Widget.ipa Payload
          cd ..
          ls -la *.ipa
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Widget-IPA
          path: Widget.ipa
      - name: Create SideStore Package
        run: |
          mkdir -p Widget-SideStore
          cp Widget.ipa Widget-SideStore/
          cp -r Widget BroadcastExtension project.yml Widget-SideStore/
          cat > Widget-SideStore/README.md << 'EOF'
# Widget App

Install via SideStore app.

Features:
- Home Screen widgets 1x1, 3x3, 6x3, 6x6
- Lock Screen widgets
- Customizable items
EOF
          zip -r Widget-SideStore.zip Widget-SideStore/
      - name: Upload SideStore
        uses: actions/upload-artifact@v4
        with:
          name: Widget-SideStore
          path: Widget-SideStore.zip