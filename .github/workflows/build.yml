name: Build Widget iOS App

on:
  push:
    branches: [widget-app-v1]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build and Create IPA
    runs-on: macos-14
    timeout-minutes: 35
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Show environment
        run: |
          echo "Starting build process..."
          whoami
          pwd
          ls -la
          
      - name: Install XcodeGen
        run: |
          which xcodegen && echo "XcodeGen found" || echo "Installing XcodeGen..."
          if ! command -v xcodegen &> /dev/null; then
            brew install xcodegen
          fi
          xcodegen --version
          
      - name: Generate Xcode project
        run: |
          xcodegen generate
          ls -la *.xcodeproj 2>/dev/null || echo "No xcodeproj"
          
      - name: Build for iOS Simulator
        run: |
          xcodebuild -project Widget.xcodeproj \
            -scheme Widget \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO 2>&1 | tee build.log | tail -20
        timeout-minutes: 25
          
      - name: Build Release for device
        run: |
          xcodebuild -project Widget.xcodeproj \
            -scheme Widget \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" 2>&1 | tee release.log | tail -20
        timeout-minutes: 25
          
      - name: Find built app
        run: |
          echo "=== Finding built app ==="
          find . -name "Widget.app" -type d 2>/dev/null | head -3
          find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d 2>/dev/null | head -5 || echo "No apps found"
          ls -la build/ 2>/dev/null || echo "No build folder"
          
      - name: Create IPA Package
        run: |
          mkdir -p dist/Payload/Widget.app
          
          # Try multiple locations for the built app
          APP_FOUND=""
          for path in "build/Release-iphoneos/Widget.app" \
                  "$HOME/Library/Developer/Xcode/DerivedData"/*/Build/Products/Release-iphoneos/Widget.app \
                  ~/Library/Developer/Xcode/DerivedData/*/Build/Products/Release-iphoneos/Widget.app; do
            if [ -d "$path" ]; then
              APP_FOUND="$path"
              break
            fi
          done
          
          if [ -n "$APP_FOUND" ] && [ -d "$APP_FOUND" ]; then
            echo "Found app: $APP_FOUND"
            cp -R "$APP_FOUND/"* dist/Payload/Widget.app/
          else
            echo "App not found - creating source package instead"
            # Package source files for local build
            cp -R Widget dist/Payload/Widget/
            cp -R BroadcastExtension dist/Payload/Widget/
            cp project.yml dist/Payload/Widget/
          fi
          
          ls -laR dist/Payload/ | head -30
          
      - name: Create IPA
        run: |
          cd dist
          zip -r ../Widget.ipa Payload
          cd ..
          ls -la *.ipa
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Widget-unsigned-IPA
          path: Widget.ipa
          retention-days: 30
          
      - name: Create SideStore Package  
        run: |
          mkdir -p Widget-SideStore
          cp Widget.ipa Widget-SideStore/
          cp -r Widget project.yml Widget-SideStore/
          cp -r BroadcastExtension Widget-SideStore/
          
          cat > Widget-SideStore/README.md << 'EOF'
# Widget App - SideStore Installation

## How to Install

1. Download Widget.ipa
2. Install SideStore on your device
3. Import the IPA file

## Requirements
- iOS 17.0+
- SideStore app
EOF
          
          zip -r Widget-SideStore.zip Widget-SideStore/
          
      - name: Upload SideStore Package
        uses: actions/upload-artifact@v4
        with:
          name: Widget-SideStore-Package
          path: Widget-SideStore.zip
          retention-days: 30