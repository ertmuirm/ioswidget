name: Build Widget iOS App

on:
  push:
    branches: [widget-app-v1]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build and Package IPA
    runs-on: macos-14
    timeout-minutes: 40
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Install XcodeGen
        run: |
          which xcodegen || brew install xcodegen
          xcodegen --version
          
      - name: Generate Xcode project
        run: |
          xcodegen generate
          
      - name: Build for iOS Simulator (Debug)
        run: |
          xcodebuild -project Widget.xcodeproj \
            -scheme Widget \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            build \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tail -15
        timeout-minutes: 20
          
      - name: Build for Device (Release)
        run: |
          xcodebuild -project Widget.xcodeproj \
            -scheme Widget \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" 2>&1 | tail -20
        timeout-minutes: 20
          
      - name: Find and Package IPA
        run: |
          mkdir -p dist/Payload/Widget.app
          
          # Find built app
          APP_PATH=""
          for d in build/Release-iphoneos "$HOME/Library/Developer/Xcode/DerivedData"/*/Build/Products/Release-iphoneos; do
            if [ -d "$d/Widget.app" ]; then
              APP_PATH="$d/Widget.app"
              break
            fi
          done
          
          if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
            echo "Found app: $APP_PATH"
            cp -R "$APP_PATH"/* dist/Payload/Widget.app/
          else
            echo "Build not found - creating source package"
            cp -r Widget dist/Payload/
            cp -r BroadcastExtension dist/Payload/
            cp project.yml dist/Payload/
          fi
          
          ls -la dist/Payload/
          
      - name: Create IPA
        run: |
          cd dist
          zip -r ../Widget.ipa Payload
          cd ..
          ls -la *.ipa
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Widget-unsigned-IPA
          path: Widget.ipa
          retention-days: 30
          
      - name: Create SideStore Package
        run: |
          mkdir -p Widget-SideStore
          cp Widget.ipa Widget-SideStore/
          cp -r Widget BroadcastExtension Widget-SideStore/
          cp project.yml Widget-SideStore/
          
          cat > Widget-SideStore/README.md << 'EOF'
# Widget App - SideStore Installation

## Installation
1. SideStore app required
2. Import Widget.ipa via Files app

## Features
- Home Screen widgets (1x1, 3x3, 6x3, 6x6)
- Lock Screen widgets
- Custom icon/text with colors
- URL Scheme/App Intent/Shortcut actions
EOF
          
          zip -r Widget-SideStore.zip Widget-SideStore/
          
      - name: Upload SideStore Package
        uses: actions/upload-artifact@v4
        with:
          name: Widget-SideStore-Package
          path: Widget-SideStore.zip
          retention-days: 30

  verify:
    name: Verify Project
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: widget-app-v1
          
      - name: Verify files
        run: |
          echo "=== Project Files ==="
          find . -name "*.swift" -o -name "*.plist" -o -name "project.yml" | grep -v "^./.git" | sort