name: Build Widget App

on:
  push:
    branches: [widget-app-v1]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          xcodebuild archive -scheme Widget -configuration Release -archivePath ./build/Widget.xarchive -derivedDataPath ./DerivedData CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" DEVELOPMENT_TEAM="" AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Debug archive
        run: |
          echo "=== Checking build folder ==="
          ls -la ./build/
          ls -la ./build/Widget.xarchive/ 2>/dev/null || echo "No Widget.xarchive folder"
          ls -la ./build/Widget.xarchive/Products/ 2>/dev/null || echo "No Products folder"
          ls -la ./build/Widget.xarchive/Products/Applications/ 2>/dev/null || echo "No Applications folder"

      - name: Package as IPA
        run: |
          # This is the expected path from your code
          mkdir -p Payload
          cp -r ./build/Widget.xarchive/Products/Applications/Widget.app Payload/
          chmod +x Payload/Widget.app/Widget
          zip -r Widget.ipa Payload

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: Widget
          path: Widget.ipa
          retention-days: 30
