name: Build Widget App

on:
  push:
    branches: [widget-app-v1]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          xcodebuild archive -scheme Widget -configuration Release -archivePath ./build/Widget.xarchive -derivedDataPath ./DerivedData CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" DEVELOPMENT_TEAM="" AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Debug DerivedData
        run: |
          echo "=== Contents of DerivedData ==="
          find ./DerivedData -type d -name "*.app" 2>/dev/null | head -20
          echo "=== Top level ==="
          ls -la ./DerivedData/ 2>/dev/null || echo "No DerivedData folder"
          ls -la ./DerivedData/Build/ 2>/dev/null || echo "No Build folder"

      - name: Package as IPA
        run: |
          mkdir -p Payload
          # Direct path based on actual build location
          cp -r ./DerivedData/Build/Intermediates.noindex/ArchiveIntermediates/Widget/InstallationBuildProductsLocation/Applications/Widget.app Payload/ 2>/dev/null || {
            # Fallback to finding it
            APP_PATH=$(find ./DerivedData -name "Widget.app" -type d | head -1)
            if [ -n "$APP_PATH" ]; then
              cp -r "$APP_PATH" Payload/
            else
              echo "Error: Widget.app not found"
              exit 1
            fi
          }
          chmod +x Payload/Widget.app/Widget
          zip -r Widget.ipa Payload

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: Widget
          path: Widget.ipa
          retention-days: 30
