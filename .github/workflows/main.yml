name: Build Widget App

on:
  push:
    branches: [widget-app-v1]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          xcodebuild build \
            -scheme Widget \
            -configuration Release \
            -destination generic/platform=iOS \
            -derivedDataPath ./DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Embed Extension Manually
        run: |
          EXTENSION_PATH="./DerivedData/Build/Products/Release-iphoneos/BroadcastExtension.appex"
          APP_PATH="./DerivedData/Build/Products/Release-iphoneos/Widget.app"
          
          # Create PlugIns folder if needed
          mkdir -p "$APP_PATH/PlugIns"
          
          # Copy extension
          cp -R "$EXTENSION_PATH" "$APP_PATH/PlugIns/"
          
          # Verify
          ls -la "$APP_PATH/PlugIns/"

      - name: Create xcarchive
        run: |
          APP_PATH="./DerivedData/Build/Products/Release-iphoneos/Widget.app"
          
          # Create archive structure
          rm -rf Widget.xcarchive
          mkdir -p Widget.xcarchive/Products/Applications/Widget.app
          cp -R "$APP_PATH"/* "Widget.xcarchive/Products/Applications/Widget.app/"
          
          # Add Info.plist to archive
          cp Widget/Resources/Info.plist "Widget.xcarchive/Info.plist"
          
          # Verify
          ls -la Widget.xcarchive/Products/Applications/Widget.app/
          ls -la Widget.xcarchive/

      - name: Create ExportOptions.plist
        run: |
          cat > ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>signingStyle</key>
              <string>manual</string>
          </dict>
          </plist>
          EOF
          cat ExportOptions.plist

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath Widget.xcarchive \
            -exportPath . \
            -exportOptionsPlist ExportOptions.plist \
            CODE_SIGNING_ALLOWED=NO

      - name: Verify IPA
        run: |
          ls -la
          unzip -l Widget.ipa | head -20

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: Widget-unsigned-ipa
          path: Widget.ipa
          retention-days: 30