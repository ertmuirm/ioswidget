name: Build Widget App

on:
  push:
    branches: [widget-app-v1]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          # Build with specific derivedDataPath so we know where products are
          xcodebuild archive -scheme Widget -configuration Release -archivePath ./build/Widget.xarchive CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" DEVELOPMENT_TEAM="" -derivedDataPath ./DerivedData

      - name: Debug build outputs
        run: |
          echo "=== DerivedData Contents ==="
          ls -la ./DerivedData/
          echo "=== Products ==="
          find ./DerivedData -name "*.app" -o -name "*.appex" | head -20

      - name: Package as IPA
        run: |
          # Find app - it's in the shared BuildProductsPath (symlink)
          APP=$(find ./DerivedData -name "Widget.app" -type d | grep -v ".dSYM" | head -1)
          EXT=$(find ./DerivedData -name "BroadcastExtension.appex" -type d | head -1)
          
          if [ -z "$APP" ] || [ -z "$EXT" ]; then
            echo "APP: $APP"
            echo "EXT: $EXT"
            echo "Error: App or Extension not found"
            exit 1
          fi
          
          # Copy and embed
          rm -rf ./temp
          cp -rL "$APP" ./temp/Widget.app
          mkdir -p ./temp/Widget.app/PlugIns
          cp -r "$EXT" ./temp/Widget.app/PlugIns/
          
          # Create IPA
          mkdir -p Payload
          cp -r ./temp/Widget.app Payload/
          chmod +x Payload/Widget.app/Widget
          zip -r Widget.ipa Payload

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: Widget
          path: Widget.ipa
          retention-days: 30
