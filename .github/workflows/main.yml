name: Build Widget App

on:
  push:
    branches: [widget-app-v1]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          xcodebuild archive \
            -scheme Widget \
            -configuration Release \
            -archivePath ./build/Widget.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Package as IPA
        run: |
          mkdir -p Payload
          cp -r ./build/Widget.xcarchive/Products/Applications/Widget.app Payload/
          chmod +x Payload/Widget.app/Widget
          zip -r Widget.ipa Payload

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: Widget-unsigned-ipa
          path: Widget.ipa
          retention-days: 30