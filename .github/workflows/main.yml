name: Build Widget App

on:
  push:
    branches: [widget-app-v1]

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        
      - name: Setup XcodeGen
        run: |
          which xcodegen || brew install xcodegen
          
      - name: Generate
        run: |
          xcodegen generate
          
      - name: Build
        run: |
          xcodebuild -project Widget.xcodeproj -scheme Widget -configuration Release -destination generic/platform=iOS build CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY="" 2>&1 | tail -20
        timeout-minutes: 20
          
      - name: Package
        run: |
          mkdir -p Payload/Widget.app
          
          # Find Widget.app in DerivedData
          echo "Looking for Widget.app..."
          find ~/Library/Developer/Xcode/DerivedData -name "Widget.app" -type d 2>/dev/null | while read app; do
            echo "Found: $app"
            # Check if this is the correct app (has our bundle id)
            if [ -f "$app/Info.plist" ]; then
              BUNDLE=$(plutil -p "$app/Info.plist" 2>/dev/null | grep CFBundleIdentifier | head -1)
              echo "Bundle: $BUNDLE"
              if [[ "$BUNDLE" == *"com.iosmirror"* ]]; then
                echo "Copying correct app: $app"
                cp -R "$app"/* Payload/Widget.app/
                break
              fi
            fi
          done
          
          # Check what we have
          ls -la Payload/
          ls -la Payload/Widget.app/ 2>/dev/null || echo "Widget.app not found"
          
          # Create ZIP if we have content
          if ls -la Payload/Widget.app/ | grep -q "^d"; then
            cd Payload && zip -r9 ../Widget.ipa * && cd ..
          else
            # Fallback: include project
            echo "Including project sources instead"
            cp -r Widget BroadcastExtension project.yml Payload/
            cd Payload && zip -r9 ../Widget.ipa * && cd ..
          fi
          
          ls -la *.ipa
          
      - uses: actions/upload-artifact@v4
        with:
          name: Widget-unsigned-ipa
          path: Widget.ipa