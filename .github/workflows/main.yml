name: Build Widget App

on:
  push:
    branches: [widget-app-v1]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          xcodebuild archive -scheme Widget -configuration Release -archivePath ./build/Widget.xarchive -derivedDataPath ./DerivedData CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" DEVELOPMENT_TEAM="" AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Find and Export app
        run: |
          # Find the app in DerivedData and copy to archive location
          APP_PATH=$(find ./DerivedData -name "Widget.app" -type d | grep -v dSYM | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: Widget.app not found"
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          mkdir -p ./build/Widget.xarchive/Products/Applications
          cp -r "$APP_PATH" ./build/Widget.xarchive/Products/Applications/

      - name: Package as IPA
        run: |
          mkdir -p Payload
          cp -r ./build/Widget.xarchive/Products/Applications/Widget.app Payload/
          chmod +x Payload/Widget.app/Widget
          zip -r Widget.ipa Payload

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: Widget
          path: Widget.ipa
          retention-days: 30
