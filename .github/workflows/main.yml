name: Build Widget App

on:
  push:
    branches: [widget-app-v1]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          xcodebuild archive -scheme Widget -configuration Release -archivePath ./build/Widget.xarchive CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" DEVELOPMENT_TEAM="" AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Embed Extension Manually
        run: |
          # The archive creates the app in a different location
          ARCHIVE_PATH="./build/Widget.xarchive"
          APP_PATH="$ARCHIVE_PATH/Products/Applications/Widget.app"
          EXTENSIONPATH="$ARCHIVE_PATH/Products/Applications/Widget.app/Frameworks" # or check other locations
          
          # Check actual extension location
          EXTENSION_PATH=$(find ./build -name "BroadcastExtension.appex" -type d 2>/dev/null | head -1)
          
          if [ ! -d "$APP_PATH" ]; then
            echo "Error: Widget.app not found at $APP_PATH"
            ls -la "$ARCHIVE_PATH/Products/Applications/" 2>/dev/null || echo "Applications folder not found"
            exit 1
          fi
          
          # Create PlugIns folder if extension exists
          if [ -n "$EXTENSION_PATH" ] && [ -d "$EXTENSION_PATH" ]; then
            mkdir -p "$APP_PATH/PlugIns"
            cp -R "$EXTENSION_PATH" "$APP_PATH/PlugIns/"
            echo "Extension embedded"
          else
            echo "Warning: Extension not found"
          fi
          
          ls -la "$APP_PATH/"

      - name: Package as IPA
        run: |
          ARCHIVE_PATH="./build/Widget.xarchive"
          APP_PATH="$ARCHIVE_PATH/Products/Applications/Widget.app"
          
          if [ ! -d "$APP_PATH" ]; then
            echo "Error: Widget.app not found"
            exit 1
          fi
          
          rm -rf Payload Widget.ipa
          mkdir -p Payload/Widget.app
          cp -a "$APP_PATH/." Payload/Widget.app/
          chmod +x Payload/Widget.app/Widget
          
          # Create IPA - zip from parent to include Payload prefix
          zip -y -r Widget.ipa Payload
          
          unzip -l Widget.ipa | head -15

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: Widget
          path: Widget.ipa
          retention-days: 30
