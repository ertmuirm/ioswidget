name: Build Widget App

on:
  push:
    branches: [widget-app-v1]

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        
      - name: Setup XcodeGen
        run: |
          which xcodegen || brew install xcodegen
          
      - name: Generate
        run: |
          xcodegen generate
          
      - name: Build
        run: |
          xcodebuild -project Widget.xcodeproj -scheme Widget -configuration Release -destination generic/platform=iOS build CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY="" 2>&1 | tail -20
        timeout-minutes: 20
          
      - name: Package
        run: |
          mkdir -p Payload/Widget.app
          
          echo "Looking for Widget.app..."
          LATEST_APP=$(find ~/Library/Developer/Xcode/DerivedData -name "Widget.app" -type d 2>/dev/null | tail -1)
          echo "Found: $LATEST_APP"
          
          if [ -n "$LATEST_APP" ] && [ -d "$LATEST_APP" ]; then
            cp -R "$LATEST_APP"/* Payload/Widget.app/
          fi
          
          ls -la Payload/
          
          cd Payload && zip -r9 ../Widget.ipa * && cd ..
          ls -la *.ipa
          du -sh *.ipa
          
      - uses: actions/upload-artifact@v4
        with:
          name: Widget-unsigned-ipa
          path: Widget.ipa