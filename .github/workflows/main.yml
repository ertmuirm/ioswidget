name: Build Widget App

on:
  push:
    branches: [widget-app-v1]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          xcodebuild archive -scheme Widget -configuration Release -archivePath ./build/Widget.xarchive CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" DEVELOPMENT_TEAM="" AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Debug - Find all apps
        run: |
          find . -name "*.app" -type d 2>/dev/null
          find /Users/runner/Library/Developer/Xcode/DerivedData -name "BroadcastExtension.appex" -type d 2>/dev/null

      - name: Package as IPA
        run: |
          # Look in global DerivedData since local archive may not have extension
          WORK_DIR="/Users/runner/work/ioswidget/ioswidget"
          APP_SRC=$(find "$WORK_DIR" -name "Widget.app" -path "*/Applications/*" -type d 2>/dev/null | head -1)
          if [ -z "$APP_SRC" ]; then
            # Try DerivedData
            APP_SRC=$(find ~/Library/Developer/Xcode/DerivedData -name "Widget.app" -path "*/Applications/*" -type d 2>/dev/null | head -1)
          fi
          
          EXT=$(find ~/Library/Developer/Xcode/DerivedData -name "BroadcastExtension.appex" -type d 2>/dev/null | head -1)
          if [ -z "$EXT" ] || [ -z "$APP_SRC" ]; then
            echo "APP: $APP_SRC EXT: $EXT"
            echo "Error: Widget.app or BroadcastExtension.appex not found"
            ls -la ~/Library/Developer/Xcode/DerivedData/ 2>/dev/null || echo "No DerivedData"
            exit 1
          fi
          
          # Copy app to temp location for modification
          rm -rf ./temp
          cp -r "$APP_SRC" ./temp/Widget.app
          
          # Embed extension
          mkdir -p ./temp/Widget.app/PlugIns
          cp -r "$EXT" ./temp/Widget.app/PlugIns/
          
          # Create IPA
          mkdir -p Payload
          cp -r ./temp/Widget.app Payload/
          chmod +x Payload/Widget.app/Widget
          zip -r Widget.ipa Payload

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: Widget
          path: Widget.ipa
          retention-days: 30
