name: Build Widget App

on:
  push:
    branches: [widget-app-v1]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          xcodebuild archive -scheme Widget -configuration Release -archivePath ./build/Widget.xarchive CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" DEVELOPMENT_TEAM="" AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package as IPA
        run: |
          # App in local archive
          APP_SRC="./build/Widget.xarchive.xcarchive/Products/Applications/Widget.app"
          
          EXT=""
          # First check if extension is in the archive products folder next to app
          for e in "./build/Widget.xarchive.xcarchive/Products/Applications/BroadcastExtension.appex" "./build/Widget.xarchive.xcarchive/Products/BroadcastExtension.appex"; do
            if [ -e "$e" ]; then
              EXT="$e"
              echo "Found ext locally: $e"
              break
            fi
          done
          
          # If not found, search in global DerivedData
          if [ -z "$EXT" ]; then
            EXT=$(find /Users/runner/Library/Developer/Xcode/DerivedData -name "BroadcastExtension.appex" -type d 2>/dev/null | head -1)
            echo "Found ext in DerivedData: $EXT"
          fi
          
          if [ ! -e "$APP_SRC" ] || [ -z "$EXT" ] || [ ! -d "$EXT" ]; then
            echo "APP: $APP_SRC exists: $([ -e "$APP_SRC" ] && echo yes || echo no)"
            echo "EXT: $EXT found: $([ -n "$EXT" ] && echo yes || echo no)"
            echo "Error: App or Extension not found"
            ls ./build/Widget.xarchive.xcarchive/Products/Applications/
            exit 1
          fi
          
          rm -rf ./temp
          cp -rL "$APP_SRC" ./temp/Widget.app
          mkdir -p ./temp/Widget.app/PlugIns
          cp -r "$EXT" ./temp/Widget.app/PlugIns/
          mkdir -p Payload
          cp -r ./temp/Widget.app Payload/
          chmod +x Payload/Widget.app/Widget
          zip -r Widget.ipa Payload

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: Widget
          path: Widget.ipa
          retention-days: 30
