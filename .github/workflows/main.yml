name: Build Widget App

on:
  push:
    branches: [widget-app-v1]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          xcodebuild archive -scheme Widget -configuration Release -archivePath ./build/Widget.xarchive CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" DEVELOPMENT_TEAM="" AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package as IPA
        run: |
          # Use absolute path
          DD_BASE=$(find /Users/runner/Library/Developer/Xcode/DerivedData -type d -name "Widget-*" -maxdepth 1 | head -1)
          if [ -z "$DD_BASE" ]; then
            echo "Error: DerivedData folder not found"
            exit 1
          fi
          echo "Using DerivedData: $DD_BASE"
          
          # Find app and extension in the correct build locations
          APP_SRC="$DD_BASE/Build/Intermediates.noindex/ArchiveIntermediates/Widget/InstallationBuildProductsLocation/Applications/Widget.app"
          EXT="$DD_BASE/Build/Intermediates.noindex/ArchiveIntermediates/Widget/IntermediateBuildFilesPath/UninstalledProducts/iphoneos/BroadcastExtension.appex"
          
          if [ ! -d "$APP_SRC" ] || [ ! -d "$EXT" ]; then
            echo "APP: $APP_SRC exists: $([ -d "$APP_SRC" ] && echo yes || echo no)"
            echo "EXT: $EXT exists: $([ -d "$EXT" ] && echo yes || echo no)"
            # Try listing possible locations
            echo "Checking BuildProductsPath/Release-iphoneos:"
            ls "$DD_BASE/Build/Intermediates.noindex/ArchiveIntermediates/Widget/BuildProductsPath/Release-iphoneos/" 2>/dev/null || echo "No Release-iphoneos"
            echo "Checking InstallationBuildProductsLocation:"
            ls "$DD_BASE/Build/Intermediates.noindex/ArchiveIntermediates/Widget/InstallationBuildProductsLocation/Applications/" 2>/dev/null || echo "No Applications"
            echo "Error: App or Extension not found"
            exit 1
          fi
          
          # Copy app to temp location for modification
          rm -rf ./temp
          cp -r "$APP_SRC" ./temp/Widget.app
          
          # Embed extension
          mkdir -p ./temp/Widget.app/PlugIns
          cp -r "$EXT" ./temp/Widget.app/PlugIns/
          
          # Create IPA
          mkdir -p Payload
          cp -r ./temp/Widget.app Payload/
          chmod +x Payload/Widget.app/Widget
          zip -r Widget.ipa Payload

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: Widget
          path: Widget.ipa
          retention-days: 30
