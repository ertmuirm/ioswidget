name: Build Widget App

on:
  push:
    branches: [widget-app-v1]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          # Build for device with specific derivedDataPath
          xcodebuild build -scheme Widget -configuration Release -destination 'generic/platform=iOS' CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" DEVELOPMENT_TEAM="" -derivedDataPath ./DerivedData

      - name: Package as IPA
        run: |
          # Use find to locate app and extension
          WORK_DIR="/Users/runner/work/ioswidget/ioswidget"
          APP=$(find "$WORK_DIR/DerivedData" -name "Widget.app" -type d 2>/dev/null | grep -v ".dSYM" | head -1)
          EXT=$(find "$WORK_DIR/DerivedData" -name "BroadcastExtension.appex" -type d 2>/dev/null | head -1)
          
          if [ -z "$APP" ] || [ -z "$EXT" ]; then
            echo "APP: $APP"
            echo "EXT: $EXT"
            echo "Error: App or Extension not found"
            exit 1
          fi
          
          echo "Using APP: $APP"
          echo "Using EXT: $EXT"
          
          # Copy and embed
          rm -rf ./temp
          cp -rL "$APP" ./temp/Widget.app
          mkdir -p ./temp/Widget.app/PlugIns
          cp -r "$EXT" ./temp/Widget.app/PlugIns/
          
          # Create IPA
          mkdir -p Payload
          cp -r ./temp/Widget.app Payload/
          chmod +x Payload/Widget.app/Widget
          zip -r Widget.ipa Payload

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: Widget
          path: Widget.ipa
          retention-days: 30
