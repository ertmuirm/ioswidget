name: Build Widget App

on:
  push:
    branches: [widget-app-v1]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          # Build for device with specific derivedDataPath
          xcodebuild build -scheme Widget -configuration Release -destination 'generic/platform=iOS' CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" DEVELOPMENT_TEAM="" -derivedDataPath ./DerivedData

      - name: Package as IPA
        run: |
          # Use find to locate app and extension
          WORK_DIR="/Users/runner/work/ioswidget/ioswidget"
          APP="$WORK_DIR/DerivedData/Build/Products/Release-iphoneos/Widget.app"
          EXT="$WORK_DIR/DerivedData/Build/Products/Release-iphoneos/BroadcastExtension.appex"
          
          echo "Using APP: $APP"
          echo "Using EXT: $EXT"
          
          # Verify files exist
          if [ ! -d "$APP" ]; then
            echo "Error: Widget.app not found at $APP"
            exit 1
          fi
          if [ ! -d "$EXT" ]; then
            echo "Error: BroadcastExtension.appex not found at $EXT"
            exit 1
          fi
          
          # Copy and embed using absolute paths
          rm -rf ./temp
          mkdir -p ./temp/Widget.app
          cp -a "$APP/"* ./temp/Widget.app/
          mkdir -p ./temp/Widget.app/PlugIns
          cp -a "$EXT/"* ./temp/Widget.app/PlugIns/
          
          # Create IPA
          mkdir -p Payload
          cp -a ./temp/Widget.app Payload/
          chmod +x Payload/Widget.app/Widget
          zip -r Widget.ipa Payload

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: Widget
          path: Widget.ipa
          retention-days: 30
