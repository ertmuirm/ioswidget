name: Build Widget App

on:
  push:
    branches: [widget-app-v1]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          xcodebuild archive -scheme Widget -configuration Release -archivePath ./build/Widget.xarchive -derivedDataPath ./DerivedData CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" DEVELOPMENT_TEAM="" AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Embed Extension Manually
        run: |
          # Find the built app in DerivedData from archive
          APP_PATH=$(find ./DerivedData -name "Widget.app" -type d | head -1)
          EXTENSION_PATH=$(find ./DerivedData -name "BroadcastExtension.appex" -type d | head -1)
          
          if [ -z "$APP_PATH" ] || [ -z "$EXTENSION_PATH" ]; then
            echo "Error: Could not find Widget.app or BroadcastExtension.appex"
            exit 1
          fi
          
          # Create PlugIns folder
          mkdir -p "$APP_PATH/PlugIns"
          
          # Copy extension
          cp -R "$EXTENSION_PATH" "$APP_PATH/PlugIns/"
          
          # Verify
          ls -la "$APP_PATH/PlugIns/"

      - name: Package as IPA
        run: |
          # Find the app bundle
          APP_PATH=$(find ./DerivedData -name "Widget.app" -type d | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "Error: Could not find Widget.app"
            exit 1
          fi
          
          # Clean up old files
          rm -rf Payload Widget.ipa
          
          # Create proper IPA structure
          mkdir -p Payload/Widget.app
          cp -a "$APP_PATH/." Payload/Widget.app/
          chmod +x Payload/Widget.app/Widget
          
          # Create IPA - zip from parent to include Payload prefix
          zip -y -r Widget.ipa Payload
          
          # Verify contents
          unzip -l Widget.ipa | head -15

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: Widget-unsigned-ipa
          path: Widget.ipa
          retention-days: 30
