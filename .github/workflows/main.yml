name: Build Widget App

on:
  push:
    branches: [widget-app-v1]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          xcodebuild archive -scheme Widget -configuration Release -archivePath ./build/Widget.xarchive CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" DEVELOPMENT_TEAM="" AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package as IPA
        run: |
          # First check local archive (xcodebuild archive creates this structure)
          ARCHIVE="./build/Widget.xarchive.xcarchive"
          APP_SRC=""
          EXT=""
          
          for d in "$ARCHIVE/Products/Applications/Widget.app" "$ARCHIVE/Products/Applications/Widget.app"; do
            if [ -e "$d" ]; then
              APP_SRC="$d"
              echo "Found app at: $d"
              break
            fi
          done
          
          # Also try finding extension in local archive
          for e in "$ARCHIVE/Products/Applications/BroadcastExtension.appex" "./build/Widget.xarchive.xcarchive/Products/Applications/BroadcastExtension.appex"; do
            if [ -e "$e" ]; then
              EXT="$e"
              echo "Found ext at: $e"
              break
            fi
          done
          
          # If not found locally, try DerivedData
          if [ -z "$APP_SRC" ]; then
            DD_BASE=$(find /Users/runner/Library/Developer/Xcode/DerivedData -maxdepth 1 -type d -name "*Widget*" | head -1)
            for d in "$DD_BASE/Build/Intermediates.noindex/ArchiveIntermediates/Widget/BuildProductsPath/Release-iphoneos/Widget.app" "$DD_BASE/Build/Intermediates.noindex/ArchiveIntermediates/Widget/InstallationBuildProductsLocation/Applications/Widget.app"; do
              if [ -e "$d" ]; then
                APP_SRC="$d"
                echo "Found app at: $d"
                break
              fi
            done
            EXT="$DD_BASE/Build/Intermediates.noindex/ArchiveIntermediates/Widget/IntermediateBuildFilesPath/UninstalledProducts/iphoneos/BroadcastExtension.appex"
          fi
          
          if [ -z "$APP_SRC" ] || [ ! -d "$EXT" ]; then
            echo "APP src: $APP_SRC"
            echo "EXT src: $EXT"
            echo "APP found: $([ -n "$APP_SRC" ] && echo yes || echo no)"
            echo "EXT found: $([ -d "$EXT" ] && echo yes || echo no)"
            echo "Error: Not found"
            ls ./build/Widget.xarchive.xcarchive/Products/Applications/ 2>/dev/null || echo "No local Products"
            exit 1
          fi
          
          echo "Using APP: $APP_SRC"
          echo "Using EXT: $EXT"
          
          rm -rf ./temp
          cp -rL "$APP_SRC" ./temp/Widget.app
          mkdir -p ./temp/Widget.app/PlugIns
          cp -r "$EXT" ./temp/Widget.app/PlugIns/
          mkdir -p Payload
          cp -r ./temp/Widget.app Payload/
          chmod +x Payload/Widget.app/Widget
          zip -r Widget.ipa Payload

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: Widget
          path: Widget.ipa
          retention-days: 30
