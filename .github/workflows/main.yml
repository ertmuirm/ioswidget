name: Build Widget App

on:
  push:
    branches: [widget-app-v1]

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        
      - name: Setup XcodeGen
        run: |
          which xcodegen || brew install xcodegen
          
      - name: Generate
        run: |
          xcodegen generate
          
      - name: Build
        run: |
          xcodebuild -project Widget.xcodeproj -scheme Widget -configuration Release -destination generic/platform=iOS -derivedDataPath ./DerivedData build CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY="" 2>&1
        timeout-minutes: 20
          
      - name: Package
        run: |
          mkdir -p Payload
          
          echo "Checking build output..."
          ls -la DerivedData/
          find DerivedData -type d -name "*.app" 2>/dev/null
          
          if [ -d "DerivedData/Build/Products/Release-iphoneos/Widget.app" ]; then
            echo "Found Widget.app"
            cp -R DerivedData/Build/Products/Release-iphoneos/Widget.app Payload/
          fi
          
          ls -la Payload/
          
          cd Payload && zip -r9 ../Widget.ipa * && cd ..
          ls -la *.ipa
          
      - uses: actions/upload-artifact@v4
        with:
          name: Widget-unsigned-ipa
          path: Widget.ipa