name: Build Widget App

on:
  push:
    branches: [widget-app-v1]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          # Build for device with specific derivedDataPath
          xcodebuild build -scheme Widget -configuration Release -destination 'generic/platform=iOS' CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" DEVELOPMENT_TEAM="" -derivedDataPath ./DerivedData

      - name: Package as IPA
        run: |
          WORK_DIR="/Users/runner/work/ioswidget/ioswidget"
          APP="$WORK_DIR/DerivedData/Build/Products/Release-iphoneos/Widget.app"
          EXT="$WORK_DIR/DerivedData/Build/Products/Release-iphoneos/BroadcastExtension.appex"
          
          # Verify files exist
          if [ ! -d "$APP" ] || [ ! -d "$EXT" ]; then
            echo "Error: Widget.app or BroadcastExtension.appex not found"
            exit 1
          fi
          
          # Clean and create fresh directories
          rm -rf ./Payload ./temp
          mkdir -p ./Payload/Widget.app/PlugIns ./temp
          
          # Copy app bundle (entire directory, preserving structure)
          cp -a "$APP" ./Payload/Widget.app
          
          # Embed extension in PlugIns
          cp -a "$EXT" ./Payload/Widget.app/PlugIns/
          
          # Verify structure
          echo "=== IPA Structure ==="
          ls -la Payload/
          ls -la Payload/Widget.app/
          ls -la Payload/Widget.app/PlugIns/
          
          # Make executable
          chmod +x Payload/Widget.app/Widget
          
          # Create IPA (zip from Payload directory contents)
          cd Payload && zip -r ../Widget.ipa . && cd ..

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: Widget
          path: Widget.ipa
          retention-days: 30
