name: Build Widget App

on:
  push:
    branches: [widget-app-v1]

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        
      - name: Setup XcodeGen
        run: |
          which xcodegen || brew install xcodegen
          
      - name: Generate
        run: |
          xcodegen generate
          
      - name: Build
        run: |
          xcodebuild -project Widget.xcodeproj -scheme Widget -configuration Release -destination generic/platform=iOS -derivedDataPath build build CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY="" 2>&1 | tail -30
        timeout-minutes: 20
          
      - name: Package
        run: |
          mkdir -p Payload/Widget.app
          
          echo "Looking for Widget.app in build folder..."
          if [ -d "build/Build/Products/Release-iphoneos/Widget.app" ]; then
            echo "Found in build folder"
            cp -R build/Build/Products/Release-iphoneos/Widget.app/* Payload/Widget.app/
          elif [ -d "build/Build/Products/Release-iphoneos/BroadcastExtension.appex" ]; then
            echo "Found BroadcastExtension"
          else
            echo "Searching for apps..."
            find build -name "*.app" -type d
          fi
          
          ls -la Payload/
          du -sh Payload/
          
          cd Payload && zip -r9 ../Widget.ipa * && cd ..
          ls -la *.ipa
          du -sh *.ipa
          
      - uses: actions/upload-artifact@v4
        with:
          name: Widget-unsigned-ipa
          path: Widget.ipa