name: Build Widget App

on:
  push:
    branches: [widget-app-v1]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          xcodebuild build \
            -scheme Widget \
            -configuration Release \
            -destination generic/platform=iOS \
            -derivedDataPath ./DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Embed Extension Manually
        run: |
          EXTENSION_PATH="./DerivedData/Build/Products/Release-iphoneos/BroadcastExtension.appex"
          APP_PATH="./DerivedData/Build/Products/Release-iphoneos/Widget.app"
          
          # Create PlugIns folder if needed
          mkdir -p "$APP_PATH/PlugIns"
          
          # Copy extension
          cp -R "$EXTENSION_PATH" "$APP_PATH/PlugIns/"
          
          # Verify
          ls -la "$APP_PATH/PlugIns/"

      - name: Package as IPA
        run: |
          APP_PATH="./DerivedData/Build/Products/Release-iphoneos/Widget.app"
          
          # Clean up old files
          rm -rf Payload Widget.ipa
          
          # Create IPA structure
          mkdir -p Payload/Widget.app
          
          # Copy app bundle
          cp -a "$APP_PATH/." Payload/Widget.app/
          
          # Fix permissions
          chmod +x Payload/Widget.app/Widget
          
          # Create IPA via zip
          cd Payload
          zip -y -r ../Widget.ipa .
          cd ..
          
          # Verify contents
          unzip -l Widget.ipa | head -15
          echo "---"
          unzip -l Widget.ipa | grep -E "\.app|Payload"

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: Widget-unsigned-ipa
          path: Widget.ipa
          retention-days: 30