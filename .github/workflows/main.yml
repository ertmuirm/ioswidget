name: Build Widget App

on:
  push:
    branches: [widget-app-v1]

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        
      - name: Setup XcodeGen
        run: |
          which xcodegen || brew install xcodegen
          
      - name: Generate
        run: |
          xcodegen generate
          
      - name: Build
        run: |
          xcodebuild -project Widget.xcodeproj -scheme Widget -configuration Release -destination generic/platform=iOS -derivedDataPath ./DerivedData build CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY="" 2>&1 | tee build.log
          echo "=== BUILD COMPLETE ==="
          tail -50 build.log
        timeout-minutes: 20
          
      - name: Package
        run: |
          mkdir -p Payload
          
          echo "Checking build output..."
          ls -la DerivedData/ 2>/dev/null || echo "No DerivedData"
          find DerivedData -type d -name "*.app" 2>/dev/null
          cat build.log | grep -E "(BUILD SUCCEEDED|BUILD FAILED)" || echo "No build result found"
          
          if [ -f "DerivedData/Build/Products/Release-iphoneos/Widget.app" ]; then
            echo "Found Widget.app"
            cp -R DerivedData/Build/Products/Release-iphoneos/Widget.app Payload/
          elif [ -f "DerivedData/Build/Products/Release-iphoneos/"*.app ]; then
            echo "Found app(s)"
            cp -R DerivedData/Build/Products/Release-iphoneos/*.app Payload/ 2>/dev/null || true
          fi
          
          ls -la Payload/
          
          cd Payload && zip -r9 ../Widget.ipa * && cd ..
          ls -la *.ipa
          
      - uses: actions/upload-artifact@v4
        with:
          name: Widget-unsigned-ipa
          path: Widget.ipa
          
      - uses: actions/upload-artifact@v4
        with:
          name: Build-log
          path: build.log