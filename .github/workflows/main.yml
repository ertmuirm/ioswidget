name: Build Widget App

on:
  push:
    branches: [widget-app-v1]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          xcodebuild archive -scheme Widget -configuration Release -archivePath ./build/Widget.xarchive CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" DEVELOPMENT_TEAM="" AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Debug archive
        run: |
          ls -la ./build/
          ls -la ./build/Widget.xarchive.xcarchive/
          ls -la ./build/Widget.xarchive.xcarchive/Products/
          ls -la ./build/Widget.xarchive.xcarchive/Products/Applications/

      - name: Package as IPA
        run: |
          DD_BASE=$(find /Users/runner/Library/Developer/Xcode/DerivedData -maxdepth 1 -type d -name "*Widget*" | head -1)
          
          # Use absolute path to app in local archive
          APP_SRC="/Users/runner/work/ioswidget/ioswidget/build/Widget.xarchive.xcarchive/Products/Applications/Widget.app"
          
          # Find extension in DerivedData
          EXT=$(find /Users/runner/Library/Developer/Xcode/DerivedData -name "BroadcastExtension.appex" -type d 2>/dev/null | head -1)
          
          if [ ! -d "$APP_SRC" ] || [ -z "$EXT" ]; then
            echo "Error - APP: $APP_SRC exists: $([ -d "$APP_SRC" ] && echo yes || echo no)"
            echo "Error - EXT: $EXT exists: $([ -d "$EXT" ] && echo yes || echo no)"
            ls -la ./build/Widget.xarchive.xcarchive/Products/Applications/
            exit 1
          fi
          
          rm -rf ./temp
          cp -rL "$APP_SRC" ./temp/Widget.app
          mkdir -p ./temp/Widget.app/PlugIns
          cp -r "$EXT" ./temp/Widget.app/PlugIns/
          mkdir -p Payload
          cp -r ./temp/Widget.app Payload/
          chmod +x Payload/Widget.app/Widget
          zip -r Widget.ipa Payload

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: Widget
          path: Widget.ipa
          retention-days: 30
